<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="16" y="16" width="480" height="480" rx="84" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.15"/>

  <!-- Bar chart: 3 ascending bars -->
  <rect x="96"  y="310" width="88" height="130" rx="12" fill="url(#bar1)"/>
  <rect x="212" y="220" width="88" height="220" rx="12" fill="url(#bar2)"/>
  <rect x="328" y="130" width="88" height="310" rx="12" fill="url(#bar1)"/>

  <!-- Trend line connecting bar tops -->
  <polyline
    points="140,305 256,215 372,125"
    fill="none"
    stroke="white"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.45"
  />

  <!-- Arrow head on trend line -->
  <circle cx="372" cy="125" r="14" fill="white" fill-opacity="0.7"/>

  <!-- Small upward arrow above top bar -->
  <polyline
    points="358,111 372,96 386,111"
    fill="none"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.9"
  />
</svg>
