<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Shine overlay top -->
  <rect width="512" height="256" rx="108" fill="url(#shineGrad)"/>
  <rect y="256" width="512" height="256" rx="0" fill="url(#shineGrad)" opacity="0"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.12"/>

  <!-- Bar chart: 3 bars (left to right, ascending) -->
  <rect x="80" y="320" width="90" height="140" rx="14" fill="url(#barGrad1)" opacity="0.85"/>
  <rect x="210" y="240" width="90" height="220" rx="14" fill="url(#barGrad2)" opacity="0.9"/>
  <rect x="340" y="148" width="90" height="312" rx="14" fill="white" opacity="0.92"/>

  <!-- Trend line over bars -->
  <polyline
    points="125,315 255,235 385,143"
    fill="none"
    stroke="url(#arrowGrad)"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Arrow head at tip -->
  <circle cx="385" cy="143" r="16" fill="url(#arrowGrad)" opacity="0.9"/>
  <polyline
    points="370,128 385,112 400,128"
    fill="none"
    stroke="url(#arrowGrad)"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Gold coin badge (bottom-right accent) -->
  <circle cx="390" cy="390" r="54" fill="url(#coinGrad)" filter="url(#shadow)"/>
  <circle cx="390" cy="390" r="44" fill="none" stroke="#fbbf24" stroke-width="3" stroke-opacity="0.6"/>
  <!-- ₹ symbol on coin -->
  <text x="390" y="405" font-family="Georgia, serif" font-size="46" font-weight="bold"
    fill="#92400e" text-anchor="middle" opacity="0.85">₹</text>
</svg>
