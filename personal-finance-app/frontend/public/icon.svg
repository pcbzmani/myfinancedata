<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Warm amber-gold background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c47d0e"/>
      <stop offset="100%" stop-color="#a85e00"/>
    </linearGradient>
    <!-- Bright gold coin gradient -->
    <radialGradient id="coinGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="45%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <!-- Green growth gradient -->
    <linearGradient id="greenGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <!-- Inner shadow for depth -->
    <filter id="innerShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#7c3f00" flood-opacity="0.4"/>
    </filter>
    <!-- Glow for arrow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App background — warm amber rounded square (high contrast vs dark sidebar) -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- Subtle highlight rim at top -->
  <rect x="1" y="1" width="510" height="255" rx="108" fill="rgba(255,255,255,0.08)"/>
  <rect x="1" y="1" width="510" height="510" rx="108" fill="none" stroke="rgba(255,220,80,0.35)" stroke-width="3"/>

  <!-- ── COIN (centred 320px diameter) ── -->
  <circle cx="256" cy="256" r="158" fill="url(#coinGrad)" filter="url(#innerShadow)"/>
  <!-- Coin rim -->
  <circle cx="256" cy="256" r="158" fill="none" stroke="#fbbf24" stroke-width="10"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="138" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- ── RUPEE SYMBOL – bold, dark, instantly readable ── -->
  <!-- Main ₹ body as composed shapes for crispness at all sizes -->
  <!-- Horizontal top bar -->
  <rect x="180" y="164" width="152" height="26" rx="13" fill="#7c3f00"/>
  <!-- Second horizontal bar -->
  <rect x="180" y="207" width="120" height="22" rx="11" fill="#7c3f00"/>
  <!-- Vertical stem -->
  <rect x="180" y="164" width="26" height="184" rx="13" fill="#7c3f00"/>
  <!-- Diagonal slash line for ₹ effect (down-right) -->
  <line x1="200" y1="229" x2="310" y2="348" stroke="#7c3f00" stroke-width="26" stroke-linecap="round"/>

  <!-- ── UPWARD ARROW (growth indicator) – bright green, top-right of coin ── -->
  <g filter="url(#glow)">
    <polyline points="316,152 344,118 372,152" stroke="#22c55e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="344" y1="118" x2="344" y2="190" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  </g>
</svg>
