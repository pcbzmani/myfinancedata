[functions]
  node_bundler = "esbuild"

# VITE_VAPID_PUBLIC_KEY is intentionally bundled into the client (public key by design).
# VAPID_EMAIL appears in split.html as a contact address — not a secret.
# VITE_GOOGLE_CLIENT_ID is a public OAuth identifier, safe to bundle into frontend JS.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VAPID_PUBLIC_KEY,VITE_VAPID_PUBLIC_KEY,VAPID_EMAIL,VITE_GOOGLE_CLIENT_ID,NTFY_ALERT_TOPIC,ADMIN_SECRET"

# SPA routing — send all requests to index.html (functions take priority)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
