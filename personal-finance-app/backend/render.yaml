services:
  - type: web
    name: myfinance-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        fromSecret: JWT_SECRET
      - key: CLIENT_URL
        fromSecret: CLIENT_URL
